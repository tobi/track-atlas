<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg:#080a0f; --bg2:#0d111a; --panel:#111722; --panel2:#17202e;
    --text:#f3f6fb; --muted:#93a0b5; --faint:#5f6b80; --line:#273244;
    --accent:#ff2d8d; --accent2:#5eead4; --warn:#f6c945; --good:#35c759;
    --shadow:0 18px 60px rgba(0,0,0,.35);
  }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--text); font-family:Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
         background:radial-gradient(circle at 20% -10%, rgba(255,45,141,.18), transparent 34%),
                    radial-gradient(circle at 95% 4%, rgba(94,234,212,.12), transparent 30%), var(--bg); }
  a { color:inherit; text-decoration:none; }
  header { position:sticky; top:0; z-index:20; backdrop-filter:blur(18px); background:rgba(8,10,15,.78); border-bottom:1px solid rgba(255,255,255,.06);
           padding:18px 28px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:18px; letter-spacing:2.5px; font-weight:900; }
  header h1 .accent { color:var(--accent); }
  header .sub { color:var(--muted); font-size:13px; }
  header .sub a { color:var(--text); border-bottom:1px solid rgba(255,255,255,.18); }
  #search { margin:22px 28px 18px; display:block; width:calc(100% - 56px); max-width:720px; padding:15px 18px; font-size:16px;
            background:rgba(17,23,34,.92); color:var(--text); border:1px solid var(--line); border-radius:16px; outline:none; box-shadow:var(--shadow); }
  #search:focus { border-color:rgba(255,45,141,.8); box-shadow:0 0 0 4px rgba(255,45,141,.12), var(--shadow); }
  #grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:18px; padding:0 28px 42px; }
  .card { background:linear-gradient(180deg, rgba(23,32,46,.95), rgba(17,23,34,.95)); border:1px solid rgba(255,255,255,.08); border-radius:20px;
          overflow:hidden; cursor:pointer; transition:transform .16s, border-color .16s, background .16s; box-shadow:0 10px 36px rgba(0,0,0,.24); }
  .card:hover { transform:translateY(-4px); border-color:rgba(255,45,141,.7); background:linear-gradient(180deg, rgba(31,42,60,.98), rgba(17,23,34,.98)); }
  .card .body { padding:18px 18px 16px; }
  .card h3 { margin:0 0 8px; font-size:18px; letter-spacing:.1px; }
  .card .meta { color:var(--muted); font-size:12.5px; line-height:1.45; }
  .chip { display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:750; letter-spacing:.6px;
          background:rgba(255,45,141,.12); border:1px solid rgba(255,45,141,.38); color:var(--text); margin:0 5px 5px 0; text-transform:uppercase; }
  #detail { display:none; padding:0 28px 56px; }
  .back { display:inline-block; margin:16px 0 16px; color:var(--muted); cursor:pointer; font-size:13px; }
  .back:hover { color:var(--text); }
  .hero { display:flex; justify-content:space-between; align-items:flex-end; gap:18px; flex-wrap:wrap; padding:22px; border:1px solid rgba(255,255,255,.08); border-radius:24px;
          background:linear-gradient(135deg, rgba(255,45,141,.14), rgba(94,234,212,.06) 42%, rgba(17,23,34,.9)); box-shadow:var(--shadow); }
  .hero h2 { margin:0; font-size:34px; letter-spacing:-.9px; }
  .hero .aka { color:var(--muted); margin-top:6px; }
  .det-actions, .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .btn, select { padding:9px 13px; border-radius:12px; font-size:13px; cursor:pointer; background:rgba(23,32,46,.95); border:1px solid var(--line); color:var(--text); }
  .btn:hover, select:hover { border-color:rgba(255,45,141,.7); }
  .btn.primary { background:linear-gradient(135deg, var(--accent), #a855f7); border-color:transparent; font-weight:800; }
  label.control { color:var(--muted); font-size:12px; letter-spacing:.7px; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(145px,1fr)); gap:10px; margin:16px 0; }
  .stat { background:rgba(17,23,34,.82); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:12px 14px; }
  .stat .k { color:var(--muted); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }
  .stat .v { font-size:17px; font-weight:850; margin-top:4px; }
  .map-wrap { display:grid; grid-template-columns:minmax(0, 1fr) minmax(260px, 310px); gap:12px; align-items:stretch; margin-top:16px; }
  @media (max-width:760px) { .map-wrap { grid-template-columns:1fr; } }
  #map { min-height:500px; height:58vh; border-radius:22px; border:1px solid rgba(255,255,255,.1); overflow:hidden; box-shadow:var(--shadow); background:#111; }
  .map-readout { min-width:230px; max-width:320px; padding:10px 12px; border-radius:14px; background:rgba(8,10,15,.88); color:var(--text); border:1px solid rgba(255,255,255,.14); box-shadow:0 10px 32px rgba(0,0,0,.35); font:12px/1.35 Inter, ui-sans-serif, system-ui, sans-serif; backdrop-filter:blur(12px); }
  .map-readout .big { font-size:18px; font-weight:900; letter-spacing:-.3px; }
  .map-readout .muted { color:var(--muted); }
  .map-readout .hit { margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,.08); }
  .map-readout b { color:#fff; }
  .layer-panel { background:rgba(17,23,34,.92); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:12px; overflow:auto; max-height:58vh; box-shadow:var(--shadow); }
  .layer-panel h4 { margin:2px 0 10px; font-size:12px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted); }
  .mini-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:0 0 14px; }
  .mini-actions button { padding:7px 8px; border-radius:10px; font-size:12px; cursor:pointer; background:var(--panel2); border:1px solid var(--line); color:var(--text); }
  .layer-group-title { margin:15px 0 7px; color:var(--faint); font-size:11px; letter-spacing:1.4px; text-transform:uppercase; }
  .layer-toggle { display:flex; gap:8px; align-items:flex-start; padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.055); border-radius:10px; transition:background .12s, transform .12s; }
  .layer-toggle:hover { background:rgba(255,255,255,.055); transform:translateX(-2px); }
  .layer-toggle input { margin-top:2px; accent-color:var(--accent); }
  .layer-toggle b { font-size:13px; }
  .layer-toggle .meta { color:var(--muted); font-size:11px; margin-top:2px; line-height:1.35; }
  .layer-range-highlight { stroke-dasharray: 16 10; animation: dash 650ms linear infinite; filter: drop-shadow(0 0 10px rgba(255,255,255,.72)); }
  @keyframes dash { to { stroke-dashoffset: -26; } }
  table { width:100%; border-collapse:collapse; margin-top:14px; font-size:13.5px; background:rgba(17,23,34,.56); border:1px solid rgba(255,255,255,.07); border-radius:16px; overflow:hidden; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid rgba(255,255,255,.06); }
  th { color:var(--muted); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; background:rgba(255,255,255,.025); }
  tr:hover td { background:rgba(255,255,255,.035); }
  td .edit { visibility:hidden; font-size:12px; cursor:pointer; color:var(--muted); }
  tr:hover td .edit { visibility:visible; }
  td .edit:hover { color:var(--accent); }
  .muted { color:var(--muted); }
  .section-title { margin:26px 0 8px; font-size:17px; }
  .copy-wrap { margin-top:24px; padding:15px; border:1px solid rgba(255,255,255,.08); border-radius:20px; background:rgba(17,23,34,.88); display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; box-shadow:var(--shadow); }
  .copy-wrap code { color:var(--muted); font-size:12px; }
  footer { padding:18px 28px 30px; color:var(--muted); font-size:12px; }
  dialog { background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:18px; max-width:620px; width:92vw; padding:22px; box-shadow:var(--shadow); }
  dialog::backdrop { background:rgba(0,0,0,.72); }
  dialog h3 { margin:0 0 6px; }
  dialog p { color:var(--muted); font-size:13px; }
  dialog label { display:block; margin:10px 0 4px; font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  dialog input, dialog select { width:100%; padding:10px 12px; background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:10px; font-size:14px; }
  dialog .row { display:flex; gap:10px; }
  dialog .row > div { flex:1; }
  dialog .actions { margin-top:18px; display:flex; gap:10px; justify-content:flex-end; }
</style>
</head>
<body>
<header>
  <h1><span class="accent">TRACK</span> ATLAS</h1>
  <span class="sub">layout layers · timing sectors · real geometry</span>
  <span class="sub"><a href="tracks.jsonl"><b>⬇ tracks.jsonl</b></a> — one JSON object per track</span>
  <span class="sub"><a href="https://github.com/tobi/track-atlas" target="_blank">github</a></span>
</header>
<input id="search" type="search" placeholder="Search tracks — name, country, series, corner…" autocomplete="off">
<div id="grid"></div>
<div id="detail"></div>
<footer>Geometry © OpenStreetMap contributors (ODbL) · corner data: Lovely-Sim-Racing + curated · track-atlas</footer>
<dialog id="editDlg"></dialog>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
