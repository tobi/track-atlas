<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #0a0c12; --panel: #12151f; --panel2: #1b2030;
    --text: #eef2fb; --muted: #8794ab; --accent: #e6007e; --line: #2a3146;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font-family: Helvetica, Arial, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  header { padding: 22px 28px 10px; display: flex; align-items: baseline; gap: 18px;
           flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 26px; letter-spacing: 1px; }
  header h1 .accent { color: var(--accent); }
  header .sub { color: var(--muted); font-size: 13px; }
  #search { margin: 10px 28px 18px; display: block; width: calc(100% - 56px);
            max-width: 560px; padding: 12px 16px; font-size: 16px;
            background: var(--panel2); color: var(--text);
            border: 1px solid var(--line); border-radius: 10px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
          gap: 18px; padding: 0 28px 40px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          overflow: hidden; cursor: pointer; transition: transform .12s, border-color .12s; }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block;
              background: var(--panel2); }
  .card .body { padding: 12px 16px 14px; }
  .card h3 { margin: 0 0 4px; font-size: 17px; }
  .card .meta { color: var(--muted); font-size: 12.5px; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px;
          background: rgba(230,0,126,.14); border: 1px solid rgba(230,0,126,.45);
          color: var(--text); margin: 0 4px 4px 0; text-transform: uppercase; }
  /* detail view */
  #detail { display: none; padding: 0 28px 50px; }
  #detail .back { display: inline-block; margin: 4px 0 14px; color: var(--muted);
                  cursor: pointer; }
  #detail .back:hover { color: var(--accent); }
  .det-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .det-head h2 { margin: 0; font-size: 30px; }
  .det-head .aka { color: var(--muted); }
  .det-actions { margin: 10px 0 18px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 9px; font-size: 13px; cursor: pointer;
         background: var(--panel2); border: 1px solid var(--line); color: var(--text); }
  .btn:hover { border-color: var(--accent); }
  .det-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 980px) { .det-cols { grid-template-columns: 1fr; } }
  #map { height: 480px; border-radius: 14px; border: 1px solid var(--line); }
  .poster img { width: 100%; border-radius: 14px; border: 1px solid var(--line); }
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
           gap: 10px; margin: 16px 0; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 10px 14px; }
  .stat .k { color: var(--muted); font-size: 11px; letter-spacing: 1.5px;
             text-transform: uppercase; }
  .stat .v { font-size: 18px; font-weight: 700; margin-top: 3px; }
  table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 13.5px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-size: 11px; letter-spacing: 1.5px;
       text-transform: uppercase; }
  tr:hover td { background: rgba(255,255,255,.025); }
  td .edit { visibility: hidden; font-size: 12px; cursor: pointer; color: var(--muted); }
  tr:hover td .edit { visibility: visible; }
  td .edit:hover { color: var(--accent); }
  .muted { color: var(--muted); }
  footer { padding: 18px 28px 30px; color: var(--muted); font-size: 12px; }
  /* edit dialog */
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--line);
           border-radius: 14px; max-width: 560px; width: 92vw; padding: 22px; }
  dialog::backdrop { background: rgba(0,0,0,.65); }
  dialog h3 { margin: 0 0 6px; }
  dialog p { color: var(--muted); font-size: 13px; }
  dialog label { display: block; margin: 10px 0 4px; font-size: 12px; color: var(--muted);
                 letter-spacing: 1px; text-transform: uppercase; }
  dialog input, dialog select { width: 100%; padding: 9px 12px; background: var(--panel2);
           color: var(--text); border: 1px solid var(--line); border-radius: 8px;
           font-size: 14px; }
  dialog .row { display: flex; gap: 10px; }
  dialog .row > div { flex: 1; }
  dialog .actions { margin-top: 18px; display: flex; gap: 10px; justify-content: flex-end; }
  /* driving sim */
  .drive { margin: 22px 0 6px; }
  .sim-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .sim-bar .lbl { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .sim-bar button { padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
                    background: var(--panel2); border: 1px solid var(--line); color: var(--text); }
  .sim-bar button:hover { border-color: var(--accent); }
  .sim-bar button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sim-bar .legend { margin-left: auto; color: var(--muted); font-size: 12px; }
  .sim-bar .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
                       margin: 0 4px 0 12px; vertical-align: middle; }
  #sim { height: 460px; border-radius: 14px; overflow: hidden; border: 1px solid var(--line);
         background: var(--bg); }
  #sim canvas { display: block; width: 100%; height: 100%; }
  #simHud { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header>
  <h1><span class="accent">TRACK</span> ATLAS</h1>
  <span class="sub">corner names · real geometry · every track in the world (eventually)</span>
  <span class="sub"><a href="tracks.jsonl"><b>⬇ tracks.jsonl</b></a> — the dataset (one JSON object per track)</span>
  <span class="sub"><a href="https://github.com/tobi/track-atlas" target="_blank">github</a></span>
</header>
<input id="search" type="search" placeholder="Search tracks — name, country, series, corner…" autocomplete="off">
<div id="grid"></div>
<div id="detail"></div>
<footer>Geometry © OpenStreetMap contributors (ODbL) · corner data: Lovely-Sim-Racing + curated · track-atlas</footer>
<dialog id="editDlg"></dialog>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="sim.js"></script>
<script src="app.js"></script>
</body>
</html>
